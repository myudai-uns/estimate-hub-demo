            </>
          )}

          {step===3 && (
            <div className="space-y-3">
              {missing.length > 0 && (
                <div className="gloss"><b>未入力項目：</b> {missing.join(" / ")}</div>
              )}
              <div className="card p-4 space-y-2">
                <Dt label="案件名">{form.jobName || "—"}</Dt>
                <div className="grid grid-cols-2 gap-3">
                  <Dt label="顧客">{cusName(form.customerId)}</Dt>
                  <Dt label="案件種別">{form.category}</Dt>
                  <Dt label="PLCメーカー">{form.plc}</Dt>
                  <Dt label="積算担当">{userById(form.estimatorId).name}</Dt>
                  <Dt label="提出希望日">{form.dueDate || "—"}</Dt>
                  <Dt label="想定予算">{form.budget?yen(Number(form.budget)):"—"}</Dt>
                </div>
                <Dt label="仕様メモ"><div className="whitespace-pre-line text-[12.5px]">{form.spec || "—"}</div></Dt>
                <Dt label="添付ファイル">{form.files.length}件 {form.files.map(f=>f.name).join("、")}</Dt>
              </div>
              <div className="impl">登録すると新規 Job レコード＋紐づく EstimateRequest レコードが作成され、積算担当に通知が飛びます（モック）。</div>

        </div>

        <div className="px-5 py-3 border-t border-ink-200 flex items-center justify-between">
          <button onClick={onClose} className="btn btn-ghost">キャンセル</button>
          <div className="flex gap-2">
            {step>1 && <button className="btn btn-ghost" onClick={()=>setStep(step-1)}>← 戻る</button>}
            {step<3 && <button className="btn btn-primary" onClick={()=>setStep(step+1)}>次へ →</button>}
            {step===3 && <button className="btn btn-primary" onClick={submit} disabled={missing.length>0}>{missing.length>0?"未入力あり":"登録する"}</button>}
          </div>
        </div>
      </div>
    </div>
  );
}

function Field({label, required, children}){
  return (
    <div>
      <div className="label mb-1">{label} {required && <span className="text-rose-500">*</span>}</div>
      {children}
    </div>
  );
}

function Modal({title, onClose, children}){
  return (
    <div className="fixed inset-0 z-50 grid place-items-center">
      <div className="absolute inset-0 bg-black/30" onClick={onClose}/>
      <div className="relative bg-white rounded-lg shadow-xl w-[520px] max-w-[90vw] p-5">
        <div className="flex items-center justify-between mb-3">
          <div className="font-bold text-ink-900">{title}</div>
          <button onClick={onClose} className="text-ink-400 hover:text-ink-700 text-xl">×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

      <Section title="3. 主要 Workflow（Phase1必須）">
        <Code>{`■ 見積依頼の登録
  When "登録する" is clicked
    1. Create a new Job  (status="intake", current_amount=0, last_activity=Current date)
    2. Create a new EstimateRequest (job=Result of step1, status="intake")
    3. For each uploaded file: Create JobFile (job=Result of step1, version="v1", is_current=yes)
    4. Send notification to job's estimator  (email or in-app)
    5. Navigate to page "job" with job_id=Result of step1

■ 差戻し
  When "差戻しを送信" is clicked
    1. Make changes to EstimateRequest: status="rework", rework_reason=Input rework's value
    2. Make changes to Job:           status="rework", last_activity=Current date
    3. Create JobComment (author=Current User, body="【差戻し】"+rework_reason)
    4. Send notification to requested_by

■ ファイルアップロード（同名は版上げ）
  When file is uploaded
    1. Search JobFile (job=current job, file_name=uploaded file's name, is_current=yes)
       - if result count > 0:  Make changes to that JobFile: is_current=no
         then Create new JobFile with version = "v" + (search:count + 1)
       - else:                  Create new JobFile with version = "v1", is_current=yes
    2. Make changes to Job: last_activity=Current date

■ 新Rev追加
  When "Revを追加" is clicked
    1. Create Estimate (rev=Job's current_rev+1, amount=input, reason=input, date=Current date)
    2. Make changes to Job: current_amount=input.amount, current_rev=Estimate.rev, last_activity=Current date

■ 停滞検出（バックエンド・1日1回）
  Scheduled API Workflow daily:
    - Search Jobs where status="estimating" and last_activity < Current date -5 days
    - For each: Set custom flag stalled=yes (UIで強調)

■ パーツマスタ：保存
  When "保存" is clicked
    if Edit対象がnull: Create Part
    else:              Make changes to Part
    （カテゴリ・メーカー・在庫状況はOption Setなので追加・並び替えはDB変更なし）

■ 案件にパーツを追加
  When PopupPartPicker の "選択したパーツを追加" is clicked
    For each selected Part:
      Create JobPart (job=Current Job, part=Part, qty=1, reflected_in_estimate=no, note="")

■ 使用予定パーツの数量変更
  When qty Input is changed
    Make changes to JobPart: qty=Input's value
  （UI側で「不足数量」「発注要否」が即時再計算される。DBに保存しない）

■ 在庫ステータス更新（手動）
  When PopupPartEdit の chip 群クリック
    Make changes to Part: stock_status = clicked option
  ※下記の StockMovement 経由フローを併用するなら、ここは手動上書きフォールバックとして残す。

■ 在庫移動の登録（入庫/出庫/棚卸）
  When PopupStockMove の "登録" is clicked
    Set local var newQty =
      type="in"     → part's stock_qty + qty
      type="out"    → max(0, part's stock_qty - qty)
      type="adjust" → max(0, part's stock_qty + qty)   // qty は ± 符号付き
      type="allocate"/"release" → part's stock_qty     // 在庫数は動かさず履歴のみ
    Set newStatus =
      newQty=0                            → "out"
      part.safety_stock>0 AND newQty<safety_stock → "low"
      else                                 → "in_stock"
    1. Create StockMovement (part, type, qty(=表示用に保存), balance=newQty, job?, by=Current User, ts=Current date/time, note)
    2. Make changes to Part: stock_qty=newQty, stock_status=newStatus

■ 顧客マスタの保存
  When PopupCustomerEdit の "保存" is clicked
    if Edit対象がnull: Create Customer
    else:              Make changes to Customer
  ※ active=no にすると見積依頼登録ダイアログのドロップダウンから自動的に外れる仕様（Search constraint: active=yes）。`}</Code>
      </Section>

          <li>新Revが追加された → 営業（sales）に in-app</li>
          <li>コメントで <code>@◯◯</code> された → 該当ユーザに in-app</li>
          <li>担当案件が3日以上更新なし → 朝のダイジェストでまとめ送信</li>
        </ul>
        <p>※ 顧客ヒアリングで条件・粒度を調整。Phase1 では <b>in-app 通知だけ</b>でリリースし、email は後付けでも可。</p>
      </Section>

      <Section title="6. 将来の項目追加・拡張ポイント">
        <p className="font-bold text-ink-800 mt-1">▶ 案件・見積まわり</p>
        <ul className="list-disc pl-5 space-y-1">
          <li>Job に <b>Tag (List of text)</b> を追加すれば、検索条件を増やさず多軸検索可能。</li>
          <li>EstimateRequest に <b>checklist (yes/no 複数項目)</b> を追加すれば、情報不足のチェックを定型化できる（差戻しの起点）。</li>
          <li>Estimate に <b>明細行（別Data Type EstimateLine）</b> を持たせれば、Phase2 で「明細入力 + 自動合計」「過去明細の流用」へ拡張可能。</li>
          <li>Customer に <b>担当営業マスタ / 取引条件</b> を持たせれば、Job 作成時の自動セットが可能。</li>
          <li>Salesforce / kintone との<b>連携API</b>は Phase2 以降。Phase1 は URL 相互リンクのみで運用負荷を下げる。</li>
        </ul>

        <p className="font-bold text-ink-800 mt-3">▶ パーツ・在庫まわり（Phase2 ロードマップ）</p>
        <ul className="list-disc pl-5 space-y-1">
          <li><b>在庫引当（手動）：</b> <span className="text-emerald-700 font-semibold">Phase1で実装済</span>。<code>JobPart.allocated_qty</code> を使い、使用予定パーツの「引当／解除」ボタンで任意タイミングに予約。実在庫は動かさず <code>利用可能 = stock_qty − Σ allocated_qty</code> を表示。<br/><b>Phase2の自動引当：</b> Job ステータスが "submitted"/"won" になった時に未引当分を自動で <code>allocate</code>、出庫確定で <code>out</code> に変換し <code>Part.stock_qty</code> を減算。</li>
          <li><b>発注依頼：</b> <code>PurchaseRequest (job, part, qty, supplier, due_date, status)</code> Data Type を追加し、JobParts タブの「要発注リスト」から一括作成 Workflow を実装。</li>
          <li><b>仕入先連携：</b> <code>Supplier</code> に <code>api_endpoint / api_key</code> を持たせ、API Connector で価格・納期取得。Phase1 で別Data Type化しているため拡張時にスキーマ変更不要。</li>
          <li><b>部材単価更新：</b> <code>PartPriceHistory (part, price, date, source)</code> を追加し、価格改定の追跡と過去見積との差分把握。</li>
          <li><b>原価自動計算：</b> Estimate に EstimateLine（JobPart スナップショット）を生成し、<code>Σ(part.unit_price × qty)</code> で見積金額を算出。Phase1 の「見積反映」チェックがその種地になる。</li>
          <li><b>代替部品提案：</b> 在庫なし時に <code>Part.alternates</code> から候補を提示。Phase1 でフィールドだけ用意済みなので UI を足すだけで対応可。</li>
          <li><b>在庫ステータスの自動算出：</b> <code>stock_qty &gt;= 安全在庫</code> → in_stock、<code>0 &lt; stock_qty &lt; 安全在庫</code> → low、<code>0</code> → out。<code>Part.safety_stock</code> を追加すれば実現可。</li>
        </ul>
        <div className="impl mt-2">いずれも<b>既存のフィールド名を変えずに拡張</b>できるよう、Phase1 で型と命名を確定させてある。Phase2 着手時に Workflow を足すだけで段階的に進化させられる。</div>
      </Section>

      <Section title="7. やらないこと（Phase1スコープ外）">
        <ul className="list-disc pl-5 space-y-1">
          <li>金額の自動積算（部材原価マスタを用いた自動計算は Phase2 以降）</li>
          <li><b>在庫の自動引当</b>（手動引当は実装済。ステータス連動の自動引当・出庫消し込みは Phase2）</li>
          <li><b>購買システム連携・リアルタイム在庫同期</b>（仕入先APIは Phase2 以降）</li>
          <li>Salesforce / kintone との双方向API連携</li>
          <li>図面/PDF の中身を解析する類の機能（OCR / AI 抽出）</li>
          <li>顧客向けポータル（顧客が直接ログインして見る画面）</li>
          <li>ワークフロー承認（多段承認） — 必要なら Phase2 でステータスに「承認待ち」を追加して対応</li>
        </ul>
        <div className="gloss">これらを Phase1 に入れると工数が跳ね上がるうえ、Phase1 の真の目的「情報のハブ化」がぼやけます。要望が出ても Phase2 議論として記録に留めるのが推奨。</div>
      </Section>

      <Section title="8. 画面遷移マップ">
        <Code>{`Sidebar
 ├ ダッシュボード ──── 要注意案件カードをクリック ──→ 案件詳細(該当タブ)
 │                  └ アクティビティ行クリック ──→ 案件詳細(Comm)
 ├ 案件一覧 ────────── 行クリック ──→ 案件詳細(概要)
 ├ 顧客マスタ ─────── 行クリック ──→ PopupCustomerEdit (関連案件カードから案件詳細へ)
 ├ パーツマスタ ─────── 行クリック ──→ PopupPartEdit
 ├ パーツ在庫 ──────── 「現在在庫」タブ：行から PopupStockMove (入庫/出庫)
 │                  └ 「入出庫履歴」タブ：関連案件リンクから案件詳細
 ├ 類似案件検索 ─────── カードクリック ──→ 案件詳細(概要)

任意の画面のサイドバー下部

 └ 見積履歴          (Rev追加)`}</Code>
      </Section>
    </div>
  );
