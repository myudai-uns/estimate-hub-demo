// ===================== Utils =====================
const yen = (n) => n==null ? "—" : ("¥" + Number(n).toLocaleString("ja-JP"));
const daysFromToday = (d) => {
  const a = new Date(TODAY), b = new Date(d);
  return Math.round((b - a) / 86400000);
};
const yyyymm = (s) => (s||"").slice(0,7);

// ===================== Shared UI primitives =====================
const TONES = {
  default: "text-ink-900",
  brand:   "text-brand-600",
  emerald: "text-emerald-600",
  amber:   "text-amber-600",
  rose:    "text-rose-600",
  ink:     "text-ink-500",
};
const TONE_ACCENT = { default:"bg-brand-400", brand:"bg-brand-500", emerald:"bg-emerald-500", amber:"bg-amber-500", rose:"bg-rose-500", ink:"bg-ink-300" };
function Kpi({label, value, sub, tone, onClick}){
  const cls = "card p-4 relative overflow-hidden " + (onClick ? "card-int cursor-pointer" : "");
  return (
    <div className={cls} onClick={onClick}>
      <span className={"absolute left-0 top-0 bottom-0 w-1 "+(TONE_ACCENT[tone]||TONE_ACCENT.default)}></span>
      <div className="label">{label}</div>
      <div className={"text-[26px] leading-none font-bold mt-2 num "+(TONES[tone]||TONES.default)}>{value}</div>
      {sub && <div className="text-[11px] text-ink-500 mt-1.5">{sub}</div>}
    </div>
  );
}
function PageHeader({title, desc, action}){
  return (
    <div className="flex items-end justify-between gap-4">
      <div>
        <h2 className="text-xl font-bold text-ink-900 tracking-tight">{title}</h2>
        {desc && <p className="text-[12.5px] text-ink-500 mt-1.5">{desc}</p>}
      </div>
      {action}
    </div>
  );
}
function SectionTitle({children, action}){
  return (
    <div className="flex items-center justify-between mb-3">
      <div className="font-bold text-ink-800 flex items-center gap-2"><span className="w-1 h-4 rounded-full bg-brand-500"></span>{children}</div>
      {action}
    </div>
  );
}
function EmptyState({children}){
  return <div className="p-8 text-center text-ink-500 text-[12px]">{children}</div>;
}

// ===================== Dashboard =====================
function Dashboard({ jobs, requests, comments, parts, stockMoves, customers, setRoute }){
  const overdue    = useMemo(()=> jobs.filter(j => j.status!=="won" && j.status!=="lost" && daysFromToday(j.deadline) < 0), [jobs]);
  const estimating = useMemo(()=> jobs.filter(j => j.status==="estimating"), [jobs]);
  const stalled    = useMemo(()=> jobs.filter(j => j.stalledDays >= 5 && j.status==="estimating"), [jobs]);
  const rework     = useMemo(()=> jobs.filter(j => j.status==="rework"), [jobs]);

  const stockOut       = parts.filter(p=>p.stockStatus==="out");
  const belowSafety    = parts.filter(p=>p.safetyStock>0 && p.stockQty>0 && p.stockQty<p.safetyStock);
  const movesThisMonth = stockMoves.filter(m=>yyyymm(m.ts)===yyyymm(TODAY)).length;

  const activeCustomers = customers.filter(c=>c.active);
  const rankACustomers  = activeCustomers.filter(c=>c.rank==="A(主要)");
  const dormantCustomers= customers.filter(c=>!c.active);

  const byEstimator = useMemo(()=>{
    const map = {};
    jobs.filter(j=>["intake","estimating","rework"].includes(j.status)).forEach(j=>{
      map[j.estimatorId] = (map[j.estimatorId]||0) + 1;
    });
    return Object.entries(map).map(([uid,n])=>({ user:userById(uid), n })).sort((a,b)=>b.n-a.n);
  },[jobs]);

  const customerActivity = useMemo(()=>{
    return rankACustomers.map(c => {
      const cJobs = jobs.filter(j=>j.customerId===c.id);
      const active = cJobs.filter(j=>!["won","lost"].includes(j.status));
      const lastActivity = cJobs.map(j=>j.updatedAt).sort().slice(-1)[0] || "";
      return { customer:c, active, lastActivity };
    }).sort((a,b)=>b.active.length - a.active.length);
  },[jobs, rankACustomers]);

  return (
    <div className="space-y-6">
      <PageHeader title="ダッシュボード" desc="積算案件・在庫・主要取引先の状況を一画面で把握します。"/>

      <div>
        <div className="text-[11px] text-ink-500 font-bold tracking-wider mb-2">案件</div>
        <div className="grid grid-cols-4 gap-3">
          <Kpi label="積算中" value={estimating.length} sub="現在対応中の案件数" onClick={()=>setRoute({name:"jobs"})}/>
          <Kpi label="期限超過" value={overdue.length} sub="提出期限を過ぎた案件" tone="rose" onClick={()=>setRoute({name:"jobs"})}/>
          <Kpi label="停滞案件" value={stalled.length} sub="5日以上 更新なし" tone="amber" onClick={()=>setRoute({name:"jobs"})}/>
          <Kpi label="差戻し中" value={rework.length} sub="情報不足で積算待ち" tone="rose" onClick={()=>setRoute({name:"jobs"})}/>
        </div>
      </div>

      <div>
        <div className="text-[11px] text-ink-500 font-bold tracking-wider mb-2">在庫・顧客</div>
        <div className="grid grid-cols-4 gap-3">
          <Kpi label="在庫切れ" value={stockOut.length} sub="即発注が必要" tone="rose" onClick={()=>setRoute({name:"stock"})}/>
          <Kpi label="安全在庫割れ" value={belowSafety.length} sub="次回発注検討" tone="amber" onClick={()=>setRoute({name:"stock"})}/>
          <Kpi label="主要顧客（A）" value={rankACustomers.length} sub={`取引中 ${activeCustomers.length} 件中`} tone="brand" onClick={()=>setRoute({name:"customers"})}/>
          <Kpi label="今月の入出庫" value={movesThisMonth} sub={`休眠 ${dormantCustomers.length} 件`} onClick={()=>setRoute({name:"stock"})}/>
        </div>
      </div>

      <div className="grid grid-cols-3 gap-4">
        <div className="card p-4 col-span-2">
          <SectionTitle action={<button onClick={()=>setRoute({name:"jobs"})} className="text-[11px] text-brand-600 hover:underline">すべての案件を見る →</button>}>要注意案件</SectionTitle>
          <div className="space-y-1.5">
            {[...overdue, ...stalled, ...rework].filter((v,i,a)=>a.findIndex(x=>x.id===v.id)===i).slice(0,8).map(j=>{
              const dd = daysFromToday(j.deadline);
              const tags = [];
              if (dd<0) tags.push({t:`期限 ${Math.abs(dd)}日超過`, c:"bg-rose-100 text-rose-700"});
              if (j.stalledDays>=5) tags.push({t:`${j.stalledDays}日停滞`, c:"bg-amber-100 text-amber-800"});
              if (j.status==="rework") tags.push({t:"情報不足差戻", c:"bg-rose-50 text-rose-700"});
              return (
                <button key={j.id} onClick={()=>setRoute({name:"job", jobId:j.id})}
                  className="w-full text-left flex items-center justify-between px-3 py-2 rounded row-hover border border-transparent hover:border-ink-200">
                  <div className="min-w-0">
                    <div className="text-[12px] text-ink-500">{j.code} · {cusName(j.customerId)}</div>
                    <div className="font-medium text-ink-900 truncate">{j.name}</div>
                  </div>
                  <div className="flex items-center gap-2 shrink-0">
                    {tags.map((tag,i)=><span key={i} className={"chip "+tag.c}>{tag.t}</span>)}
                    <span className="text-[11px] text-ink-500">積算: {userById(j.estimatorId).name}</span>
                  </div>
                </button>
              );
            })}
            {overdue.length+stalled.length+rework.length===0 && <EmptyState>要注意案件はありません。</EmptyState>}
          </div>
        </div>

        <div className="card p-4">
          <SectionTitle>担当者別 抱え件数</SectionTitle>
          <div className="space-y-2">
            {byEstimator.map(({user, n})=>{
              const max = byEstimator[0]?.n || 1;
              return (
                <div key={user.id}>
                  <div className="flex items-center justify-between text-[12px]">
                    <span className="text-ink-800">{user.name}</span>
                    <span className="num font-medium">{n}件</span>
                  </div>
                  <div className="h-2 bg-ink-100 rounded mt-1 overflow-hidden">
                    <div className="h-full bg-brand-500" style={{width: `${(n/max)*100}%`}}/>
                  </div>
                </div>
              );
            })}
            {byEstimator.length===0 && <EmptyState>進行中の案件はありません。</EmptyState>}
          </div>
        </div>
      </div>

      <div className="grid grid-cols-2 gap-4">
        <div className="card p-4">
          <SectionTitle action={<button onClick={()=>setRoute({name:"stock"})} className="text-[11px] text-brand-600 hover:underline">在庫を見る →</button>}>在庫アラート</SectionTitle>
          {(stockOut.length+belowSafety.length)===0 ? (
            <EmptyState>在庫アラートはありません。</EmptyState>
          ) : (
            <ul className="space-y-1.5 text-[12px]">
              {[...stockOut, ...belowSafety].slice(0,6).map(p=>(
                <li key={p.id} className="flex items-center justify-between border-b border-ink-100 last:border-0 pb-1.5">
                  <span><b>{p.name}</b> <span className="num text-ink-500 ml-1">{p.model}</span></span>
                  <span>
                    <span className={"chip "+STOCK[p.stockStatus].cls}>{STOCK[p.stockStatus].label}</span>
                    {p.safetyStock>0 && p.stockQty>0 && p.stockQty<p.safetyStock && <span className="chip bg-amber-100 text-amber-800 ml-1">安全在庫割れ</span>}
                    <span className="text-[11px] text-ink-500 ml-2 num">在庫 {p.stockQty} / 安全 {p.safetyStock||"—"}</span>
                  </span>
                </li>
              ))}
            </ul>
          )}
        </div>

        <div className="card p-4">
          <SectionTitle action={<button onClick={()=>setRoute({name:"customers"})} className="text-[11px] text-brand-600 hover:underline">顧客マスタへ →</button>}>主要取引先 (Aランク) のアクティブ案件</SectionTitle>
          {customerActivity.length===0 ? (
            <EmptyState>主要取引先はありません。</EmptyState>
          ) : (
            <ul className="space-y-1.5 text-[12px]">
              {customerActivity.slice(0,6).map(({customer, active})=>(
                <li key={customer.id} className="flex items-center justify-between border-b border-ink-100 last:border-0 pb-1.5">
                  <button className="text-left min-w-0 flex-1 hover:underline text-brand-600" onClick={()=>setRoute({name:"customers", openId:customer.id})}>
                    {customer.name}<span className="text-[11px] text-ink-500 ml-1">{customer.industry}</span>
                  </button>
                  <span className="shrink-0 text-[11px] text-ink-500">進行中 <b className={active.length>0?"num text-brand-600":"num text-ink-400"}>{active.length}</b></span>
                </li>
              ))}
            </ul>
          )}
        </div>
      </div>

      <div className="card p-4">
        <SectionTitle>最近のアクティビティ</SectionTitle>
        <div className="space-y-2">
          {[...comments].sort((a,b)=>b.ts.localeCompare(a.ts)).slice(0,6).map(c=>{
            const j = jobs.find(x=>x.id===c.jobId);
            return (
              <div key={c.id} className="flex items-start gap-3 text-[12px] py-1.5 border-b border-ink-100 last:border-0">
                <span className="text-ink-400 num shrink-0">{c.ts}</span>
                <span className="font-medium shrink-0">{userById(c.userId).name}</span>
                <button onClick={()=>setRoute({name:"job", jobId:j.id, tab:"comm"})} className="text-brand-600 hover:underline shrink-0">{j.code}</button>
                <span className="text-ink-600 truncate">{c.body}</span>
              </div>
            );
          })}
        </div>
      </div>

      <div className="impl">
        <b>実装メモ：</b> KPI は <code>Do a search for X:count</code> ＋ Constraint。
        要注意案件は <code>Search Jobs (deadline &lt; current date) OR (stalled_days &gt;= 5) OR (status = rework)</code>。
        在庫アラートは <code>Search Parts (stock_status = out) merged with (stock_qty &lt; safety_stock)</code>。
        主要顧客カードは <code>Search Customers (rank = A AND active = yes)</code>。各KPIカードは Goto page Workflow をぶら下げる。
      </div>
    </div>
  );
}

function JobsList({ jobs, customers, setRoute }){
  const [q, setQ] = useState("");
  const [stat, setStat] = useState("all");
  const [cat, setCat] = useState("all");
  const [estimator, setEstimator] = useState("all");
  const [customerFilter, setCustomerFilter] = useState("all");

  const filtered = useMemo(()=> jobs.filter(j=>{
    if (stat!=="all" && j.status!==stat) return false;
    if (cat!=="all" && j.category!==cat) return false;
    if (estimator!=="all" && j.estimatorId!==estimator) return false;
    if (customerFilter!=="all" && j.customerId!==customerFilter) return false;
    if (q && !(j.name.includes(q) || j.code.includes(q) || cusName(j.customerId).includes(q))) return false;
    return true;
  }), [jobs, q, stat, cat, estimator, customerFilter]);

  return (
    <div className="space-y-4">
      <PageHeader title="案件一覧" desc={`${filtered.length}件 / 全${jobs.length}件`}/>

      <div className="card p-3 grid grid-cols-12 gap-2">
        <input className="field col-span-3" placeholder="案件名・案件番号・顧客名で検索" value={q} onChange={e=>setQ(e.target.value)} />
        <select className="field col-span-2" value={stat} onChange={e=>setStat(e.target.value)}>
          <option value="all">ステータス：すべて</option>
          {Object.values(STATUS).map(s=><option key={s.key} value={s.key}>{s.label}</option>)}
        </select>
        <select className="field col-span-2" value={cat} onChange={e=>setCat(e.target.value)}>
          <option value="all">種別：すべて</option>
          {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        <select className="field col-span-2" value={customerFilter} onChange={e=>setCustomerFilter(e.target.value)}>
          <option value="all">顧客：すべて</option>
          {customers.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <select className="field col-span-2" value={estimator} onChange={e=>setEstimator(e.target.value)}>
          <option value="all">積算担当：すべて</option>
          {USERS.filter(u=>u.role==="積算").map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
        </select>
        <button className="btn btn-ghost col-span-1 justify-center" onClick={()=>{setQ("");setStat("all");setCat("all");setEstimator("all");setCustomerFilter("all");}}>解除</button>
      </div>

      <div className="card overflow-hidden">
        <table className="w-full text-[12.5px]">
          <thead className="bg-ink-50 text-ink-600">
            <tr>
              <th className="text-left px-3 py-2 font-medium w-28">案件番号</th>
              <th className="text-left px-3 py-2 font-medium">案件名</th>
              <th className="text-left px-3 py-2 font-medium w-32">顧客</th>
              <th className="text-left px-3 py-2 font-medium w-28">種別</th>
              <th className="text-left px-3 py-2 font-medium w-24">期限</th>
              <th className="text-left px-3 py-2 font-medium w-32">ステータス</th>
              <th className="text-right px-3 py-2 font-medium w-28">金額(現Rev)</th>
              <th className="text-left px-3 py-2 font-medium w-28">積算担当</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(j=>{
              const dd = daysFromToday(j.deadline);
              const overdue = j.status!=="won" && j.status!=="lost" && dd<0;
              return (
                <tr key={j.id} onClick={()=>setRoute({name:"job", jobId:j.id})} className="cursor-pointer row-hover border-t border-ink-100">
                  <td className="px-3 py-2 num text-ink-600">{j.code}</td>
                  <td className="px-3 py-2 font-medium text-ink-900">{j.name}</td>
                  <td className="px-3 py-2">{cusName(j.customerId)}</td>
                  <td className="px-3 py-2"><span className="chip bg-ink-100 text-ink-700">{j.category}</span></td>
                  <td className={"px-3 py-2 num " + (overdue ? "text-rose-600 font-medium" : "")}>{j.deadline}{overdue && <span className="ml-1 text-[10px]">超過</span>}</td>
                  <td className="px-3 py-2"><span className={"chip "+STATUS[j.status].cls}>{STATUS[j.status].label}</span>{j.stalledDays>=5 && <span className="chip bg-amber-100 text-amber-800 ml-1">停滞{j.stalledDays}日</span>}</td>
                  <td className="px-3 py-2 text-right num">{j.amount?yen(j.amount):"—"}</td>
                  <td className="px-3 py-2">{userById(j.estimatorId).name}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {filtered.length===0 && <div className="p-8 text-center text-ink-500 text-[12px]">該当する案件はありません。</div>}
      </div>

      <div className="impl">
        <b>実装メモ：</b> Bubble では Repeating Group（type=Job）で実装。フィルタは Input/Dropdown を Custom State で受け、Constraint に <code>contains</code> 検索を組み合わせる。
        行クリックで <code>Go to page: job</code> を発火し、<code>Send parameter: job_id</code>。
      </div>
    </div>
  );
}

// ===================== Job Detail =====================
function JobDetail({ jobs, requests, setRequests, files, setFiles, comments, setComments, revs, estLines, estDocs, parts, jobParts, setJobParts, stockMoves, setStockMoves, jobId, setRoute, initialTab }){
  const job = jobs.find(j=>j.id===jobId);
  const [tab, setTab] = useState(initialTab || "summary");
  if (!job) return <div>案件が見つかりません。</div>;

  const jobReq = requests.find(r=>r.jobId===job.id);
  const jobFiles = files.filter(f=>f.jobId===job.id);
  const jobComments = comments.filter(c=>c.jobId===job.id).sort((a,b)=>a.ts.localeCompare(b.ts));
  const jobRevs = revs.filter(v=>v.jobId===job.id).sort((a,b)=>a.rev-b.rev);
  const myJobParts = jobParts.filter(jp=>jp.jobId===job.id);

  const dd = daysFromToday(job.deadline);
  const overdue = job.status!=="won" && job.status!=="lost" && dd<0;

  return (
    <div className="space-y-4">
      <div className="flex items-start justify-between gap-4">
        <div>
          <button onClick={()=>setRoute({name:"jobs"})} className="text-[12px] text-brand-600 hover:underline">← 案件一覧に戻る</button>
          <div className="mt-1 flex items-center gap-2 flex-wrap">
            <span className="num text-ink-500 text-[12px]">{job.code}</span>
            <h2 className="text-lg font-bold text-ink-900">{job.name}</h2>
            <span className={"chip "+STATUS[job.status].cls}>{STATUS[job.status].label}</span>
            {overdue && <span className="chip bg-rose-100 text-rose-700">期限{Math.abs(dd)}日超過</span>}
            {job.stalledDays>=5 && <span className="chip bg-amber-100 text-amber-800">停滞{job.stalledDays}日</span>}
          </div>
        </div>
        <div className="flex gap-2 shrink-0">
          <button className="btn btn-ghost">編集</button>
          <button className="btn btn-primary">ステータス更新</button>
        </div>
      </div>

      <div className="grid grid-cols-4 gap-3">
        <Info label="顧客" value={
          <button className="text-brand-600 hover:underline text-left" onClick={()=>setRoute({name:"customers", openId:job.customerId})}>
            {cusName(job.customerId)}
          </button>
        } sub={cusIndustry(job.customerId)}/>
        <Info label="案件種別" value={job.category} sub={`PLC: ${job.plc}`}/>
        <Info label="担当" value={`営業：${userById(job.salesId).name}`} sub={`積算：${userById(job.estimatorId).name}`}/>
        <Info label="提出期限 / 現Rev金額" value={job.deadline} sub={`${job.lastRev>0?`Rev${job.lastRev}：${yen(job.amount)}`:"見積未提出"}`}/>
      </div>

      <div className="flex gap-1 p-1 rounded-xl bg-ink-100/70 border border-ink-200/60 w-fit">
        {[
          ["summary","概要・見積依頼"],
          ["comm",`コミュニケーション (${jobComments.length})`],
          ["files",`ファイル (${jobFiles.length})`],
          ["parts",`使用予定パーツ (${myJobParts.length})`],
          ["revs",`見積履歴 (${jobRevs.length})`],
        ].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)}
            className={"px-4 py-1.5 text-[13px] rounded-lg transition " + (tab===k ? "bg-white text-brand-700 font-semibold shadow-card" : "text-ink-500 hover:text-ink-800")}>
            {l}
          </button>
        ))}
      </div>

      {tab==="summary" && <SummaryTab job={job} req={jobReq} setRequests={setRequests} requests={requests} setComments={setComments} setRoute={setRoute} />}
      {tab==="comm"    && <CommTab job={job} comments={jobComments} setComments={setComments} />}
      {tab==="files"   && <FilesTab job={job} files={jobFiles} setFiles={setFiles} />}
      {tab==="parts"   && <JobPartsTab job={job} myJobParts={myJobParts} jobParts={jobParts} parts={parts} setJobParts={setJobParts} stockMoves={stockMoves} setStockMoves={setStockMoves} setRoute={setRoute} />}
      {tab==="revs"    && <RevsTab job={job} revs={jobRevs} estLines={estLines} estDocs={estDocs} />}
    </div>
  );
}

function Info({label, value, sub}){
  return (
    <div className="card p-3">
      <div className="label">{label}</div>
      <div className="font-medium text-ink-900 mt-1">{value}</div>
      {sub && <div className="text-[11px] text-ink-500 mt-0.5">{sub}</div>}
    </div>
  );
}

// ----- Summary tab (＝見積依頼の中身) -----
function SummaryTab({ job, req, requests, setRequests, setComments, setRoute }){
  const [reworkOpen, setReworkOpen] = useState(false);
  const [reworkText, setReworkText] = useState("");
  const customer = cusById(job.customerId);

  if (!req) {
    return (
      <div className="card p-6 text-center">
        <div className="text-ink-600 mb-3">この案件の見積依頼はまだ登録されていません。</div>
        <button className="btn btn-primary mx-auto">＋ 見積依頼を作成</button>
      </div>
    );
  }

  const sendRework = () => {
    setRequests(rs => rs.map(r => r.id===req.id ? {...r, status:"rework", reworkReason: reworkText} : r));
    setComments(cs => [...cs, { id:"cmX"+Date.now(), jobId:job.id, userId:"u4", ts:TODAY+" 11:00", body:"【差戻し】"+reworkText }]);
    setReworkOpen(false);
    setReworkText("");
  };

  return (
    <div className="grid grid-cols-3 gap-4">
      <div className="col-span-2 card p-4">
        <div className="flex items-center justify-between mb-3">
          <div className="font-bold text-ink-800">見積依頼内容</div>
          <span className={"chip "+STATUS[req.status]?.cls}>{STATUS[req.status]?.label || req.status}</span>
        </div>

        <dl className="grid grid-cols-3 gap-x-4 gap-y-3 text-[12.5px]">
          <Dt label="依頼者">{userById(req.reqBy).name}</Dt>
          <Dt label="依頼日">{req.reqDate}</Dt>
          <Dt label="提出希望日">{req.dueDate}</Dt>
          <Dt label="予算">{req.budget?yen(req.budget):"—"}</Dt>
          <Dt label="添付">{req.attached.length}件</Dt>
          <Dt label="状態">{STATUS[req.status]?.label}</Dt>
        </dl>

        <div className="mt-4">
          <div className="label mb-1">仕様メモ・要求事項</div>
          <div className="bg-ink-50 border border-ink-100 rounded p-3 text-[12.5px] whitespace-pre-line">{req.spec}</div>
        </div>

        {req.status==="rework" && req.reworkReason && (
          <div className="mt-3 gloss">
            <b>差戻し理由：</b> {req.reworkReason}
          </div>
        )}

        <div className="mt-4 flex justify-end gap-2">
          {req.status!=="rework" && (
            <button onClick={()=>setReworkOpen(true)} className="btn btn-danger">情報不足で差戻し</button>
          )}
          <button className="btn btn-ghost">編集</button>
          <button className="btn btn-primary">積算を開始</button>
        </div>
      </div>

      <div className="space-y-3">
        {customer && (
          <div className="card p-4">
            <SectionTitle action={<button onClick={()=>setRoute({name:"customers", openId:customer.id})} className="text-[11px] text-brand-600 hover:underline">マスタを開く →</button>}>顧客情報</SectionTitle>
            <div className="space-y-1 text-[12px]">
              <div className="font-bold text-ink-900">{customer.name}</div>
              <div className="text-ink-500">{customer.industry}{customer.rank && <span className="chip bg-ink-100 text-ink-700 ml-1">{customer.rank}</span>}</div>
              {customer.contactPerson && <div className="text-ink-700 pt-2"><span className="label">先方担当</span><br/>{customer.contactPerson}</div>}
              {customer.tel && <div className="num text-ink-600">TEL: {customer.tel}</div>}
              {customer.payTerm && <div className="text-ink-600">支払: {customer.payTerm}</div>}
              {customer.note && <div className="bg-ink-50 border border-ink-100 rounded p-2 text-[11.5px] text-ink-700 mt-2 whitespace-pre-line">{customer.note}</div>}
            </div>
          </div>
        )}

        <div className="card p-4">
          <SectionTitle>この案件のショートカット</SectionTitle>
          <div className="space-y-2">
            <button className="btn btn-ghost w-full justify-start">＋ 図面/仕様書をアップロード</button>
            <button className="btn btn-ghost w-full justify-start">＋ 見積Revを追加</button>
            <button className="btn btn-ghost w-full justify-start">＋ コメントを書く</button>
            <button className="btn btn-ghost w-full justify-start" onClick={()=>setRoute({name:"search"})}>類似案件を探す</button>
          </div>

          <div className="mt-5">
            <div className="label mb-2">関連リンク</div>
            <ul className="text-[12px] text-brand-600 space-y-1">
              <li className="hover:underline cursor-pointer">↗ Salesforce 商談 #SF-{job.code}</li>
              <li className="hover:underline cursor-pointer">↗ kintone やりとり履歴</li>
            </ul>
            <div className="impl mt-2">外部システム（Salesforce/kintone）はURLフィールドで案件に紐付け、リンクとして表示。Phase1ではAPI連携なし。</div>
          </div>
        </div>
      </div>

      {reworkOpen && (
        <Modal title="情報不足で差戻し" onClose={()=>setReworkOpen(false)}>
          <p className="text-[12px] text-ink-600 mb-2">不足している情報・確認したい点を記入してください。営業担当へ通知され、依頼ステータスが「情報不足差戻」になります。</p>
          <textarea className="field h-32" value={reworkText} onChange={e=>setReworkText(e.target.value)} placeholder="例：①既設盤の型式 ②盤内写真 ③電源容量 ④現地確認の要否"/>
          <div className="flex justify-end gap-2 mt-3">
            <button className="btn btn-ghost" onClick={()=>setReworkOpen(false)}>キャンセル</button>
            <button className="btn btn-danger" onClick={sendRework} disabled={!reworkText.trim()}>差戻しを送信</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function Dt({label, children}){
  return (
    <div>
      <div className="label">{label}</div>
      <div className="font-medium text-ink-900 mt-0.5">{children}</div>
    </div>
  );
}

// ----- Comm tab -----
function CommTab({ job, comments, setComments }){
  const [text, setText] = useState("");
  const send = () => {
    if (!text.trim()) return;
    setComments(cs => [...cs, { id:"cmX"+Date.now(), jobId:job.id, userId:"u1", ts:TODAY+" "+new Date().toTimeString().slice(0,5), body:text.trim() }]);
    setText("");
  };
  return (
    <div className="grid grid-cols-3 gap-4">
      <div className="col-span-2 card p-4">
        <div className="font-bold text-ink-800 mb-3">時系列コメント</div>
        <div className="space-y-3">
          {comments.map(c=>{
            const u = userById(c.userId);
            const colors = ["bg-brand-500","bg-emerald-500","bg-rose-500","bg-amber-500","bg-violet-500","bg-cyan-500"];
            const color = colors[USERS.findIndex(x=>x.id===u.id) % colors.length];
            return (
              <div key={c.id} className="flex gap-3">
                <div className={"w-8 h-8 rounded-full text-white grid place-items-center text-[12px] shrink-0 "+color}>{u.name.slice(0,1)}</div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-baseline gap-2">
                    <span className="font-medium text-ink-900">{u.name}</span>
                    <span className="text-[11px] text-ink-500">{u.role} · {u.dept}</span>
                    <span className="text-[11px] text-ink-400 num ml-auto">{c.ts}</span>
                  </div>
                  <div className="bg-ink-50 border border-ink-100 rounded p-2.5 mt-1 text-[12.5px] whitespace-pre-line">{renderMentions(c.body)}</div>
                </div>
              </div>
            );
          })}
        </div>

        <div className="mt-4 border-t border-ink-100 pt-3">
          <textarea className="field h-20" placeholder="コメントを書く ／ @ でメンション" value={text} onChange={e=>setText(e.target.value)}/>
          <div className="flex justify-between mt-2">
            <span className="text-[11px] text-ink-500">@田中、@山本 などでメンションすると相手に通知が飛びます（モック）</span>
            <button className="btn btn-primary" onClick={send}>送信</button>
          </div>
        </div>
      </div>

      <div className="card p-4">
        <div className="font-bold text-ink-800 mb-3">この案件の関係者</div>
        <ul className="space-y-2 text-[12.5px]">
          {[job.salesId, job.estimatorId, "u7"].filter((v,i,a)=>a.indexOf(v)===i).map(uid=>{
            const u = userById(uid);
            return (
              <li key={uid} className="flex items-center justify-between">
                <span>{u.name}</span>
                <span className="text-[11px] text-ink-500">{u.role}</span>
              </li>
            );
          })}
        </ul>

        <div className="impl mt-4">Bubble実装：Comment Data Type ＋ mentions: List of User。投稿時に <code>Send notification</code> Workflow でメンション対象に通知を発火。</div>
      </div>
    </div>
  );
}

function renderMentions(text){
  return text.split(/(@\S+さん?|【差戻し】)/g).map((seg,i)=>{
    if (/^@/.test(seg)) return <span key={i} className="text-brand-600 bg-brand-50 px-1 rounded">{seg}</span>;
    if (seg==="【差戻し】") return <span key={i} className="chip bg-rose-100 text-rose-700 mr-1">差戻し</span>;
    return <React.Fragment key={i}>{seg}</React.Fragment>;
  });
}

// ----- Files tab -----
function FilesTab({ job, files, setFiles }){
  const [filter, setFilter] = useState("all");
  const [showOld, setShowOld] = useState(false);

  const KIND = {
    drawing:  { label:"図面",   cls:"bg-blue-50 text-blue-700" },
    spec:     { label:"仕様書", cls:"bg-violet-50 text-violet-700" },
    estimate: { label:"見積",   cls:"bg-emerald-50 text-emerald-700" },
    other:    { label:"その他", cls:"bg-ink-100 text-ink-700" },
  };

  const grouped = useMemo(()=>{
    const map = {};
    files.forEach(f => {
      const k = f.name;
      (map[k] = map[k] || []).push(f);
    });
    return Object.entries(map).map(([name, list]) => ({
      name,
      versions: list.sort((a,b)=>b.ver.localeCompare(a.ver)),
      latest: list.find(f=>f.current) || list[0],
    }));
  }, [files]);

  const list = grouped.filter(g => filter==="all" || g.latest.kind===filter);

  return (
    <div className="space-y-3">
      <div className="flex items-center justify-between">
        <div className="flex gap-1">
          {[["all","すべて"],["drawing","図面"],["spec","仕様書"],["estimate","見積"],["other","その他"]].map(([k,l])=>(
            <button key={k} onClick={()=>setFilter(k)} className={"px-3 py-1 rounded text-[12px] "+(filter===k?"bg-brand-600 text-white":"bg-white border border-ink-200 text-ink-700 hover:bg-ink-50")}>{l}</button>
          ))}
        </div>
        <div className="flex gap-2">
          <label className="text-[12px] text-ink-600 flex items-center gap-1.5"><input type="checkbox" checked={showOld} onChange={e=>setShowOld(e.target.checked)}/>旧版を表示</label>
          <button className="btn btn-primary">＋ アップロード</button>
        </div>
      </div>

      <div className="card overflow-hidden">
        <table className="w-full text-[12.5px]">
          <thead className="bg-ink-50 text-ink-600">
            <tr>
              <th className="text-left px-3 py-2 font-medium">ファイル名</th>
              <th className="text-left px-3 py-2 font-medium w-20">種別</th>
              <th className="text-left px-3 py-2 font-medium w-20">最新</th>
              <th className="text-left px-3 py-2 font-medium w-24">アップ者</th>
              <th className="text-left px-3 py-2 font-medium w-36">日時</th>
              <th className="text-left px-3 py-2 font-medium w-16">サイズ</th>
              <th className="text-right px-3 py-2 font-medium w-32">操作</th>
            </tr>
          </thead>
          <tbody>
            {list.map(g => (
              <React.Fragment key={g.name}>
                <tr className="border-t border-ink-100">
                  <td className="px-3 py-2 font-medium">{g.latest.name} <span className="num text-ink-500 text-[11px] ml-1">{g.latest.ver}</span></td>
                  <td className="px-3 py-2"><span className={"chip "+KIND[g.latest.kind].cls}>{KIND[g.latest.kind].label}</span></td>
                  <td className="px-3 py-2"><span className="chip bg-emerald-100 text-emerald-800">最新</span></td>
                  <td className="px-3 py-2">{userById(g.latest.uploader).name}</td>
                  <td className="px-3 py-2 num text-ink-600">{g.latest.ts}</td>
                  <td className="px-3 py-2 num text-ink-500">{g.latest.size}</td>
                  <td className="px-3 py-2 text-right">
                    <button className="text-brand-600 hover:underline text-[12px] mr-2">プレビュー</button>
                    <button className="text-brand-600 hover:underline text-[12px]">DL</button>
                  </td>
                </tr>
                {showOld && g.versions.filter(v=>!v.current).map(v=>(
                  <tr key={v.id} className="border-t border-ink-100 bg-ink-50/40">

// ===== 見積 金額計算ヘルパ =====
function calcEstimate(lines, discount, taxRate){
  const sec = (s)=> lines.filter(l=>l.section===s).reduce((a,l)=>a + (Number(l.price)||0)*(Number(l.qty)||0), 0);
  const material=sec("material"), labor=sec("labor"), expense=sec("expense");
  const subtotal = material+labor+expense;
  const cost = lines.reduce((a,l)=>a + (Number(l.cost)||0)*(Number(l.qty)||0), 0);
  const disc = Number(discount)||0;
  const taxable = subtotal - disc;
  const tax = Math.round(taxable * (Number(taxRate)||0)/100);
  const total = taxable + tax;
  const profit = taxable - cost;
  const profitRate = taxable>0 ? profit/taxable*100 : 0;
  return { material, labor, expense, subtotal, cost, disc, taxable, tax, total, profit, profitRate };
}

// ===================== Job Parts Tab (案件別 使用予定パーツ) =====================
function JobPartsTab({ job, myJobParts, jobParts, parts, setJobParts, stockMoves, setStockMoves, setRoute }){
  const [pickerOpen, setPickerOpen] = useState(false);

  // 全案件の引当合計（partId別）。物理在庫は減らさず「予約」する考え方
  const allocatedByPart = useMemo(()=>{
    const m = {};
    jobParts.forEach(x => { m[x.partId] = (m[x.partId]||0) + (x.allocatedQty||0); });
    return m;
  }, [jobParts]);

  const rows = myJobParts.map(jp => {
    const part = parts.find(p=>p.id===jp.partId);
    const alloc = jp.allocatedQty || 0;
    const isAllocated = alloc > 0;
    const othersAlloc = part ? Math.max(0, (allocatedByPart[part.id]||0) - alloc) : 0; // 他行/他案件の引当
    const free        = part ? part.stockQty - othersAlloc - alloc : 0;  // 現在のフリー在庫（この行の引当反映後）
    const freeForThis = part ? part.stockQty - othersAlloc : 0;          // この行に引当可能な最大
    const shortage    = part ? Math.max(0, jp.qty - freeForThis) : jp.qty;
    const orderRequired = part?.stockStatus==="checking" || shortage > 0;
    return { jp, part, alloc, isAllocated, othersAlloc, free, freeForThis, shortage, orderRequired };
  });

  const totalEstimateAmount = rows.filter(r=>r.jp.reflected).reduce((s,r) => s + (r.part?.unitPrice||0)*r.jp.qty, 0);
  const summary = {
    items:     rows.length,
    allocated: rows.filter(r=>r.isAllocated).length,
    enough:    rows.filter(r=>r.part && r.freeForThis >= r.jp.qty).length,
    shortage:  rows.filter(r=>r.shortage>0).length,
    out:       rows.filter(r=>r.part?.stockStatus==="out").length,
  };

  const updateQty = (id, qty) => setJobParts(arr => arr.map(x => x.id===id ? {...x, qty:Math.max(0, Number(qty)||0)} : x));
  const toggleReflected = (id) => setJobParts(arr => arr.map(x => x.id===id ? {...x, reflected: !x.reflected} : x));
  const removeRow = (id) => setJobParts(arr => arr.filter(x => x.id!==id));
  const addParts = (selected) => {
    const additions = selected.map(pid => ({ id:"jp"+Date.now()+pid, jobId:job.id, partId:pid, qty:1, reflected:false, allocatedQty:0, note:"" }));
    setJobParts(arr => [...arr, ...additions]);
  };

  // ===== 在庫引当（任意タイミングでON/OFF）=====
  const pushMove = (type, partId, qty, note) => {
    const part = parts.find(p=>p.id===partId);
    const mv = {
      id:"sm"+Date.now()+Math.floor(Math.random()*1000),
      partId, type, qty, balance: part?.stockQty ?? 0, // 引当/解除では実在庫(balance)は不変
      jobId: job.id, by:"u4",
      ts: TODAY + " " + new Date().toTimeString().slice(0,5), note,
    };
    setStockMoves(arr => [mv, ...arr]);
  };
  const toggleAllocate = (r) => {
    if (!r.part) return;
    if (r.isAllocated) {
      setJobParts(arr => arr.map(x => x.id===r.jp.id ? {...x, allocatedQty:0} : x));
      pushMove("release", r.part.id, r.alloc, `引当解除：${job.code} ${job.name}`);
    } else {
      const qty = Math.max(1, r.jp.qty);
      setJobParts(arr => arr.map(x => x.id===r.jp.id ? {...x, allocatedQty:qty} : x));
      pushMove("allocate", r.part.id, qty, `引当：${job.code} ${job.name}`);
    }
  };
  const allocatableCount = rows.filter(r=>r.part && !r.isAllocated && r.freeForThis>0).length;
  const allocateAll = () => {
    rows.filter(r=>r.part && !r.isAllocated && r.freeForThis>0).forEach(r=>toggleAllocate(r));
  };

  return (
    <div className="space-y-3">
      <div className="grid grid-cols-5 gap-3">

        <div className="card p-3"><div className="label">フリー在庫 不足</div><div className="num text-xl font-bold mt-1 text-amber-600">{summary.shortage}</div></div>

        </div>
        <div className="flex gap-2 shrink-0">

      <div className="card overflow-hidden">
        <table className="w-full text-[12.5px]">
          <thead className="bg-ink-50 text-ink-600">
            <tr>
              <th className="text-left  px-3 py-2 font-medium">部品名</th>
              <th className="text-left  px-3 py-2 font-medium w-28">型番</th>
              <th className="text-left  px-3 py-2 font-medium w-24">メーカー</th>
              <th className="text-right px-3 py-2 font-medium w-16">必要数</th>
              <th className="text-left  px-3 py-2 font-medium w-24">在庫状況</th>
              <th className="text-right px-3 py-2 font-medium w-14">在庫数</th>
              <th className="text-right px-3 py-2 font-medium w-16">利用可能</th>
              <th className="text-center px-3 py-2 font-medium w-28">在庫引当</th>
              <th className="text-right px-3 py-2 font-medium w-14">不足</th>
              <th className="text-center px-3 py-2 font-medium w-20">見積反映</th>
              <th className="text-right px-3 py-2 font-medium w-24">単価</th>
              <th className="text-right px-3 py-2 font-medium w-24">小計(参考)</th>
              <th className="px-2 py-2 w-16 text-center font-medium">操作</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((r)=>{
              const { jp, part, alloc, isAllocated, free, freeForThis, shortage } = r;
              if (!part) return null;
              const subtotal = part.unitPrice * jp.qty;
              return (
                <tr key={jp.id} className={"border-t border-ink-100 " + (isAllocated ? "bg-indigo-50/30" : "")}>
                  <td className="px-3 py-2 font-medium text-ink-900">{part.name}{part.alt.length>0 && <span className="chip bg-violet-50 text-violet-700 ml-2">代替品あり</span>}</td>
                  <td className="px-3 py-2 num text-ink-600">{part.model}</td>
                  <td className="px-3 py-2 text-ink-600">{part.maker}</td>
                  <td className="px-3 py-2"><input type="number" min="0" className="field num text-right w-16 px-2 py-1" value={jp.qty} onChange={e=>updateQty(jp.id, e.target.value)}/></td>
                  <td className="px-3 py-2"><span className={"chip "+STOCK[part.stockStatus].cls}>{STOCK[part.stockStatus].label}</span></td>
                  <td className="px-3 py-2 text-right num text-ink-600">{part.stockQty}</td>
                  <td className={"px-3 py-2 text-right num font-medium " + (free<0?"text-rose-600":free<=0?"text-ink-400":"text-ink-800")}>{free}</td>
                  <td className="px-3 py-2 text-center">
                    {isAllocated ? (
                      <button onClick={()=>toggleAllocate(r)}
                        className="inline-flex items-center gap-1 px-2 py-1 rounded-md text-[11px] font-semibold bg-indigo-50 text-indigo-700 border border-indigo-200 hover:bg-indigo-100 transition"
                        title="引当を解除（StockMovement: release を記録）">
                        <span>✓ 引当済 {alloc}</span><span className="text-indigo-400">×</span>
                      </button>
                    ) : freeForThis>0 ? (
                      <button onClick={()=>toggleAllocate(r)}
                        className="px-2.5 py-1 rounded-md text-[11px] font-semibold text-brand-700 border border-brand-300 hover:bg-brand-50 transition"
                        title={"必要数 "+jp.qty+" を引当（StockMovement: allocate を記録）"+(freeForThis<jp.qty?"／フリー在庫が不足するため要入庫":"")}>
                        引当{freeForThis<jp.qty?" ⚠":""}
                      </button>
                    ) : (
                      <span className="text-[11px] text-ink-400" title="フリー在庫がありません（要入庫／発注）">引当不可</span>
                    )}
                  </td>
                  <td className={"px-3 py-2 text-right num " + (shortage>0?"text-rose-600 font-bold":"text-ink-400")}>{shortage>0?shortage:"—"}</td>
                  <td className="px-3 py-2 text-center">
                    <label className="inline-flex items-center gap-1 cursor-pointer">
                      <input type="checkbox" checked={jp.reflected} onChange={()=>toggleReflected(jp.id)}/>
                      <span className="text-[11px] text-ink-600">{jp.reflected?"反映":"未反映"}</span>
                    </label>
                  </td>
                  <td className="px-3 py-2 text-right num text-ink-600">{yen(part.unitPrice)}</td>
                  <td className={"px-3 py-2 text-right num " + (jp.reflected?"font-bold text-ink-900":"text-ink-400")}>{yen(subtotal)}</td>
                  <td className="px-2 py-2 text-center whitespace-nowrap">
                    <button className="text-[11px] text-brand-600 hover:underline mr-2" onClick={()=>setRoute({name:"stock", partFilter:part.id, tab:"movements"})}>履歴</button>
                    <button className="text-rose-500 hover:text-rose-700 text-sm" onClick={()=>removeRow(jp.id)}>×</button>
                  </td>
                </tr>
              );
            })}
            {rows.length>0 && (
              <tr className="border-t-2 border-ink-200 bg-brand-50/40">
                <td colSpan={11} className="px-3 py-2 text-right font-medium">見積反映分の合計（参考値）</td>
                <td className="px-3 py-2 text-right num font-bold text-ink-900">{yen(totalEstimateAmount)}</td>
                <td></td>
              </tr>
            )}
          </tbody>
        </table>
        {rows.length===0 && <div className="p-8 text-center text-ink-500 text-[12px]">まだパーツが登録されていません。「＋ パーツを追加」から登録してください。</div>}
      </div>

      <div className="grid grid-cols-2 gap-3">
        {rows.filter(r=>r.orderRequired).length>0 && (
          <div className="card p-4">
            <div className="font-bold text-ink-800 mb-2 flex items-center gap-2">要発注リスト <span className="chip bg-rose-100 text-rose-700">{rows.filter(r=>r.orderRequired).length}件</span></div>
            <ul className="space-y-1.5 text-[12px]">
              {rows.filter(r=>r.orderRequired).map(({jp,part,shortage})=>(
                <li key={jp.id} className="flex items-center justify-between border-b border-ink-100 last:border-0 pb-1.5">
                  <span><span className="font-medium">{part.name}</span> <span className="num text-ink-500 ml-1">{part.model}</span></span>
                  <span className="text-[11px] text-ink-600">フリー不足 <b className="text-rose-600 num">{shortage||"—"}</b> ／ 仕入: {partSupName(part.supplierId)} / 標準LT {part.leadTime}日</span>
                </li>
              ))}
            </ul>
            <div className="impl mt-2">Phase2 で「発注依頼を一括作成」ボタンを追加可能（→ EstimateRequest と並列で PurchaseRequest Data Type を作成）。</div>
          </div>
        )}
        <div className="card p-4">
          <div className="font-bold text-ink-800 mb-2">引当について</div>
          <ul className="text-[12px] text-ink-600 space-y-1 list-disc pl-4">
            <li>「引当」は<b>実在庫を消費せず予約</b>します。フリー在庫だけが減ります。</li>
            <li>受注確定・出庫のタイミングで「出庫」に置き換えると実在庫が減ります。</li>
            <li>操作はすべて<b>入出庫履歴</b>に <code className="text-[11px]">allocate / release</code> として残ります。</li>
          </ul>
          <button className="btn btn-ghost mt-2" onClick={()=>setRoute({name:"stock"})}>パーツ在庫を開く →</button>
        </div>
      </div>

      <div className="impl">
        <b>実装メモ：</b> <code>JobPart (job, part, qty, allocated_qty, reflected_in_estimate, note)</code>。
        「引当」ボタンで <code>allocated_qty = qty</code> をセットし <code>StockMovement(type=allocate, qty, job)</code> を作成、「解除」で <code>allocated_qty = 0</code> ＋ <code>type=release</code> を作成（任意タイミングで実行可）。
        <code>利用可能(フリー在庫) = part.stock_qty − Σ JobPart.allocated_qty</code> を表示時に算出し、<b>実在庫(stock_qty)は引当では動かさない</b>。出庫確定時に引当を消し込み <code>type=out</code> で実在庫を更新する想定。
      </div>

      {pickerOpen && <PartPicker parts={parts} existingIds={myJobParts.map(jp=>jp.partId)} onClose={()=>setPickerOpen(false)} onConfirm={(ids)=>{addParts(ids); setPickerOpen(false);}} />}
    </div>
  );
}

function PartPicker({ parts, existingIds, onClose, onConfirm }){
  const [q, setQ] = useState("");
  const [cat, setCat] = useState("all");
  const [selected, setSelected] = useState([]);

  const list = parts.filter(p => {
    if (cat!=="all" && p.category!==cat) return false;
    if (q && !(p.name.includes(q) || p.model.includes(q) || p.maker.includes(q))) return false;
    return true;
  });

  const toggle = (id) => setSelected(s => s.includes(id) ? s.filter(x=>x!==id) : [...s, id]);

  return (
    <div className="fixed inset-0 z-50 grid place-items-center">
      <div className="absolute inset-0 bg-black/30" onClick={onClose}/>
      <div className="relative bg-white rounded-lg shadow-xl w-[760px] max-w-[95vw] max-h-[80vh] flex flex-col">
        <div className="px-5 py-3 border-b border-ink-200 flex items-center justify-between">
          <div className="font-bold text-ink-900">パーツを追加（マスタから選択）</div>
          <button onClick={onClose} className="text-ink-400 hover:text-ink-700 text-xl">×</button>
        </div>
        <div className="px-5 py-3 border-b border-ink-100 grid grid-cols-12 gap-2">
          <input className="field col-span-7" placeholder="部品名・型番・メーカーで検索" value={q} onChange={e=>setQ(e.target.value)}/>
          <select className="field col-span-5" value={cat} onChange={e=>setCat(e.target.value)}>
            <option value="all">カテゴリ：すべて</option>
            {PART_CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        <div className="flex-1 overflow-y-auto">
          <table className="w-full text-[12.5px]">
            <thead className="bg-ink-50 text-ink-600 sticky top-0">
              <tr>
                <th className="w-10 px-2 py-2"></th>
                <th className="text-left px-3 py-2 font-medium">部品名</th>
                <th className="text-left px-3 py-2 font-medium w-32">型番</th>
                <th className="text-left px-3 py-2 font-medium w-24">メーカー</th>
                <th className="text-left px-3 py-2 font-medium w-24">在庫</th>
                <th className="text-right px-3 py-2 font-medium w-24">単価</th>
              </tr>
            </thead>
            <tbody>
              {list.map(p => {
                const dup = existingIds.includes(p.id);
                const checked = selected.includes(p.id);
                return (
                  <tr key={p.id} className={"border-t border-ink-100 "+(dup?"text-ink-300":"row-hover cursor-pointer")} onClick={()=>!dup && toggle(p.id)}>
                    <td className="px-2 py-2 text-center"><input type="checkbox" checked={checked} disabled={dup} onChange={()=>toggle(p.id)}/></td>
                    <td className="px-3 py-2 font-medium">{p.name}{dup && <span className="ml-2 text-[10px] text-ink-400">(追加済)</span>}</td>
                    <td className="px-3 py-2 num">{p.model}</td>
                    <td className="px-3 py-2">{p.maker}</td>
                    <td className="px-3 py-2"><span className={"chip "+STOCK[p.stockStatus].cls}>{STOCK[p.stockStatus].label}</span></td>
                    <td className="px-3 py-2 text-right num">{yen(p.unitPrice)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {list.length===0 && <div className="p-8 text-center text-ink-500 text-[12px]">該当パーツがありません。</div>}
        </div>
        <div className="px-5 py-3 border-t border-ink-200 flex items-center justify-between">
          <div className="text-[12px] text-ink-600">{selected.length}件選択中</div>
          <div className="flex gap-2">
            <button className="btn btn-ghost" onClick={onClose}>キャンセル</button>
            <button className="btn btn-primary" disabled={selected.length===0} onClick={()=>onConfirm(selected)}>選択したパーツを追加</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ===================== Parts Master =====================
function PartsMaster({ parts, setParts, jobs, jobParts, setRoute }){
  const [q, setQ] = useState("");
  const [cat, setCat] = useState("all");
  const [stock, setStock] = useState("all");
  const [maker, setMaker] = useState("all");
  const [editing, setEditing] = useState(null); // 編集対象 or "new"

  const list = useMemo(()=>{
    return parts
      .map(p => ({ ...p, inUse: jobParts.filter(jp => jp.partId===p.id) }))
      .filter(p => {
        if (cat!=="all" && p.category!==cat) return false;
        if (stock!=="all" && p.stockStatus!==stock) return false;
        if (maker!=="all" && p.maker!==maker) return false;
        if (q && !(p.name.includes(q) || p.model.includes(q) || p.maker.includes(q))) return false;
        return true;
      });
  }, [parts, jobParts, q, cat, stock, maker]);

  const stockCounts = {
    in_stock: parts.filter(p=>p.stockStatus==="in_stock").length,
    low:      parts.filter(p=>p.stockStatus==="low").length,
    out:      parts.filter(p=>p.stockStatus==="out").length,
    checking: parts.filter(p=>p.stockStatus==="checking").length,
  };

  const save = (data) => {
    if (data.id) {
      setParts(arr => arr.map(p => p.id===data.id ? {...p, ...data} : p));
    } else {
      const id = "p"+Date.now();
      setParts(arr => [...arr, {...data, id, alt:[]}]);
    }
    setEditing(null);
  };

  return (
    <div className="space-y-4">
      <PageHeader
        title="パーツマスタ"
        desc="積算で使用する部品・部材のマスタ。在庫数・移動履歴の管理は「パーツ在庫」へ。"
        action={
          <div className="flex gap-2">
            <button className="btn btn-ghost" onClick={()=>setRoute({name:"stock"})}>パーツ在庫を開く →</button>
            <button className="btn btn-primary" onClick={()=>setEditing({id:null, name:"", model:"", maker:PART_MAKERS[0], category:PART_CATEGORIES[0], supplierId:"sp1", unitPrice:0, leadTime:7, stockStatus:"checking", stockQty:0, safetyStock:0, location:"", alt:[], note:""})}>＋ パーツを追加</button>
          </div>
        }
      />

      <div className="grid grid-cols-5 gap-3">
        <Kpi label="総アイテム数" value={parts.length}/>
        <Kpi label="在庫あり"   value={stockCounts.in_stock} tone="emerald"/>
        <Kpi label="在庫不足"   value={stockCounts.low}      tone="amber"/>
        <Kpi label="在庫なし"   value={stockCounts.out}      tone="rose"/>
        <Kpi label="確認中"     value={stockCounts.checking} tone="ink"/>
      </div>

      <div className="card p-3 grid grid-cols-12 gap-2">
        <input className="field col-span-4" placeholder="部品名・型番・メーカーで検索" value={q} onChange={e=>setQ(e.target.value)}/>
        <select className="field col-span-2" value={cat} onChange={e=>setCat(e.target.value)}>
          <option value="all">カテゴリ：すべて</option>
          {PART_CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        <select className="field col-span-2" value={maker} onChange={e=>setMaker(e.target.value)}>
          <option value="all">メーカー：すべて</option>
          {PART_MAKERS.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        <select className="field col-span-2" value={stock} onChange={e=>setStock(e.target.value)}>
          <option value="all">在庫状況：すべて</option>
          {Object.values(STOCK).map(s=><option key={s.key} value={s.key}>{s.label}</option>)}
        </select>
        <button className="btn btn-ghost col-span-2 justify-center" onClick={()=>{setQ("");setCat("all");setStock("all");setMaker("all");}}>フィルタ解除</button>
      </div>

      <div className="card overflow-hidden">
        <table className="w-full text-[12.5px]">
          <thead className="bg-ink-50 text-ink-600">
            <tr>
              <th className="text-left  px-3 py-2 font-medium">部品名</th>
              <th className="text-left  px-3 py-2 font-medium w-32">型番</th>
              <th className="text-left  px-3 py-2 font-medium w-24">メーカー</th>
              <th className="text-left  px-3 py-2 font-medium w-28">カテゴリ</th>
              <th className="text-left  px-3 py-2 font-medium w-28">仕入先</th>
              <th className="text-right px-3 py-2 font-medium w-24">単価</th>
              <th className="text-right px-3 py-2 font-medium w-16">LT(日)</th>
              <th className="text-left  px-3 py-2 font-medium w-28">在庫</th>
              <th className="text-right px-3 py-2 font-medium w-16">在庫数</th>
              <th className="text-right px-3 py-2 font-medium w-16">使用案件</th>
            </tr>
          </thead>
          <tbody>
            {list.map(p => (
              <tr key={p.id} onClick={()=>setEditing(p)} className="border-t border-ink-100 cursor-pointer row-hover">
                <td className="px-3 py-2 font-medium text-ink-900">{p.name}{p.alt.length>0 && <span className="chip bg-violet-50 text-violet-700 ml-2">代替品 {p.alt.length}</span>}</td>
                <td className="px-3 py-2 num text-ink-600">{p.model}</td>
                <td className="px-3 py-2">{p.maker}</td>
                <td className="px-3 py-2"><span className="chip bg-ink-100 text-ink-700">{p.category}</span></td>
                <td className="px-3 py-2 text-ink-600">{partSupName(p.supplierId)}</td>
                <td className="px-3 py-2 text-right num">{yen(p.unitPrice)}</td>
                <td className="px-3 py-2 text-right num">{p.leadTime}</td>
                <td className="px-3 py-2"><span className={"chip "+STOCK[p.stockStatus].cls}>{STOCK[p.stockStatus].label}</span></td>
                <td className="px-3 py-2 text-right num">{p.stockQty}</td>
                <td className="px-3 py-2 text-right num">{p.inUse.length}</td>
              </tr>
            ))}
          </tbody>
        </table>
        {list.length===0 && <div className="p-8 text-center text-ink-500 text-[12px]">該当パーツがありません。</div>}
      </div>

      {editing && <PartEditModal part={editing} parts={parts} onSave={save} onClose={()=>setEditing(null)} jobs={jobs} jobParts={jobParts} />}

      <div className="impl">
        <b>実装メモ：</b> <code>Data Type: Part (name, model, maker, category, supplier, unit_price, lead_time_days, stock_status, stock_qty, alternates: List of Part, note)</code>。
        Phase1 では <code>stock_status</code> をユーザが手動更新（option set: in_stock/low/out/checking）。
        Phase2 で <code>StockMovement</code>（入出庫）と連動させて自動算出に切り替え可能（フィールド名は変えずに済む設計）。
      </div>
    </div>
  );
}

  const usedIn = jobParts.filter(jp => jp.partId===f.id);

  return (
    <div className="fixed inset-0 z-50 grid place-items-center">
      <div className="absolute inset-0 bg-black/30" onClick={onClose}/>
      <div className="relative bg-white rounded-lg shadow-xl w-[720px] max-w-[95vw] max-h-[90vh] flex flex-col">
        <div className="px-5 py-3 border-b border-ink-200 flex items-center justify-between">
          <div className="font-bold text-ink-900">{part.id ? "パーツを編集" : "パーツを新規登録"}</div>
          <button onClick={onClose} className="text-ink-400 hover:text-ink-700 text-xl">×</button>
        </div>

        <div className="flex-1 overflow-y-auto p-5 space-y-3">
          <div className="grid grid-cols-2 gap-3">
            <Field label="部品名" required><input className="field" value={f.name} onChange={e=>update("name",e.target.value)} placeholder="例：シーケンサ CPU"/></Field>
            <Field label="型番" required><input className="field" value={f.model} onChange={e=>update("model",e.target.value)} placeholder="例：FX5U-32MT/ES"/></Field>
            <Field label="メーカー">
              <select className="field" value={f.maker} onChange={e=>update("maker",e.target.value)}>{PART_MAKERS.map(m=><option key={m}>{m}</option>)}</select>
            </Field>
            <Field label="カテゴリ">
              <select className="field" value={f.category} onChange={e=>update("category",e.target.value)}>{PART_CATEGORIES.map(m=><option key={m}>{m}</option>)}</select>
            </Field>
            <Field label="仕入先">
              <select className="field" value={f.supplierId} onChange={e=>update("supplierId",e.target.value)}>{PART_SUPPLIERS.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select>

function CustomersMaster({ customers, setCustomers, jobs, route, setRoute }){
  const [q, setQ] = useState("");

  const [active, setActive] = useState("active");
  const [editing, setEditing] = useState(null);

  // route.openId が指定されていたら自動で編集モーダルを開く（ダッシュ等からの遷移用）
  React.useEffect(()=>{
    if (route?.openId) {
      const c = customers.find(x=>x.id===route.openId);
      if (c) setEditing(c);
    }
  }, [route?.openId]);

  const list = useMemo(()=>{
    return customers
      .map(c => ({
        ...c,
        jobCount: jobs.filter(j => j.customerId === c.id).length,
        activeJobCount: jobs.filter(j => j.customerId === c.id && !["won","lost"].includes(j.status)).length,
        wonAmount: jobs.filter(j => j.customerId === c.id && j.status === "won").reduce((s,j) => s + (j.amount||0), 0),
      }))
      .filter(c => {
        if (active === "active"   && !c.active) return false;
        if (active === "inactive" &&  c.active) return false;

// ===================== Stock Hub (パーツ在庫) =====================
function StockHub({ parts, setParts, stockMoves, setStockMoves, jobs, jobParts, route, setRoute }){
  const [tab, setTab] = useState(route?.tab || "status"); // status | movements
  const [moveOpen, setMoveOpen] = useState(false);
  const [presetType, setPresetType] = useState("in");
  const [qFilter, setQFilter] = useState("");
  const [moveTypeFilter, setMoveTypeFilter] = useState("all");
  const [partFilter, setPartFilter] = useState(route?.partFilter || "all");
  const [stockTab, setStockTab] = useState("all"); // all | low | out

  // 案件詳細から「履歴を見る」で来た場合、自動で「入出庫履歴」タブに移動＆そのパーツでフィルタ
  React.useEffect(()=>{
    if (route?.partFilter) {
      setTab("movements");
      setPartFilter(route.partFilter);
    }
  }, [route?.partFilter]);

  const allocatedByPart = useMemo(()=>{
    const m = {};
    (jobParts||[]).forEach(x => { m[x.partId] = (m[x.partId]||0) + (x.allocatedQty||0); });
    return m;
  }, [jobParts]);

  const enriched = useMemo(()=>{
    return parts.map(p => {
      const movements = stockMoves.filter(m => m.partId === p.id).sort((a,b)=>b.ts.localeCompare(a.ts));
      const lastMove = movements[0];
      const allocated = allocatedByPart[p.id] || 0;
      const available = p.stockQty - allocated;
      const below = p.safetyStock > 0 && p.stockQty > 0 && p.stockQty < p.safetyStock;
      return { ...p, movements, lastMove, allocated, available, belowSafety: below, stockValue: p.unitPrice * p.stockQty };
    });
  }, [parts, stockMoves, allocatedByPart]);

  const filteredParts = useMemo(()=>{
    return enriched.filter(p => {
      if (stockTab === "low" && !(p.belowSafety || p.stockStatus==="low")) return false;
      if (stockTab === "out" && p.stockStatus !== "out") return false;
      if (qFilter && !(p.name.includes(qFilter) || p.model.includes(qFilter) || p.maker.includes(qFilter))) return false;
      return true;
    });
  }, [enriched, stockTab, qFilter]);

  const movementsList = useMemo(()=>{
    return stockMoves
      .filter(m => moveTypeFilter==="all" || m.type===moveTypeFilter)
      .filter(m => partFilter==="all" || m.partId===partFilter)
      .filter(m => {
        if (!qFilter) return true;
        const p = parts.find(x=>x.id===m.partId);
        return p && (p.name.includes(qFilter) || p.model.includes(qFilter) || (m.note||"").includes(qFilter));
      })
      .sort((a,b)=>b.ts.localeCompare(a.ts));
  }, [stockMoves, parts, moveTypeFilter, partFilter, qFilter]);

  const stats = useMemo(()=>({
    totalValue:     enriched.reduce((s,p)=>s+p.stockValue, 0),
    items:          parts.length,
    allocatedItems: enriched.filter(p=>p.allocated>0).length,
    out:            parts.filter(p=>p.stockStatus==="out").length,
    belowSafety:    enriched.filter(p=>p.belowSafety).length,
    movesThisMonth: stockMoves.filter(m => yyyymm(m.ts) === yyyymm(TODAY)).length,
  }), [enriched, parts, stockMoves]);

  const submitMove = (data) => {
    const p = parts.find(x=>x.id===data.partId);
    if (!p) return;
    const sign = MOVE_TYPES[data.type].sign;
    const newQty = sign !== 0 ? Math.max(0, p.stockQty + sign * data.qty)
                  : (data.type==="adjust" ? Math.max(0, p.stockQty + data.qty) : p.stockQty);
    const balance = newQty;
    const newStatus =
      newQty === 0 ? "out" :
      (p.safetyStock > 0 && newQty < p.safetyStock) ? "low" :
      "in_stock";

    const move = {
      id: "sm"+Date.now(),
      partId: data.partId,
      type: data.type,
      qty: Math.abs(data.qty),
      balance,
      jobId: data.jobId || null,
      by: "u4",
      ts: TODAY + " " + new Date().toTimeString().slice(0,5),
      note: data.note || "",
    };
    // adjust の qty は ± で渡されるので、表示用に符号付き保存
    if (data.type === "adjust") move.qty = data.qty;

    setStockMoves(arr => [move, ...arr]);
    if (data.type === "in" || data.type === "out" || data.type === "adjust") {
      setParts(arr => arr.map(x => x.id===data.partId ? {...x, stockQty:newQty, stockStatus:newStatus} : x));
    }
    setMoveOpen(false);
  };

  return (

                  <th className="text-left px-3 py-2 font-medium w-24">担当</th>
                  <th className="text-left px-3 py-2 font-medium">備考</th>

              </thead>
              <tbody>
                {movementsList.map(m=>{
                  const p = parts.find(x=>x.id===m.partId);
                  const j = jobs.find(x=>x.id===m.jobId);
                  const isAdjust = m.type==="adjust";
                  const sign = MOVE_TYPES[m.type].sign;
                  const displayQty = isAdjust ? (m.qty>0?`+${m.qty}`:`${m.qty}`) : (sign>0?`+${m.qty}`:sign<0?`-${m.qty}`:`${m.qty}`);
                  return (
                    <tr key={m.id} className="border-t border-ink-100">
                      <td className="px-3 py-2 num text-ink-600">{m.ts}</td>
                      <td className="px-3 py-2"><span className={"chip "+MOVE_TYPES[m.type].cls}>{MOVE_TYPES[m.type].label}</span></td>
                      <td className="px-3 py-2">
                        {p ? <>
                          <span className="font-medium">{p.name}</span>
                          <span className="num text-ink-500 ml-2">{p.model}</span>
                        </> : "—"}
                      </td>
                      <td className={"px-3 py-2 text-right num font-medium "+(isAdjust ? (m.qty>=0?"text-emerald-600":"text-rose-600") : sign>0?"text-emerald-600":sign<0?"text-rose-600":"text-ink-700")}>{displayQty}</td>
                      <td className="px-3 py-2 text-right num">{m.balance}</td>
                      <td className="px-3 py-2">{j ? <button className="text-brand-600 hover:underline" onClick={()=>setRoute({name:"job", jobId:j.id})}>{j.code}</button> : <span className="text-ink-400">—</span>}</td>
                      <td className="px-3 py-2">{userById(m.by).name}</td>
                      <td className="px-3 py-2 text-ink-600">{m.note || <span className="text-ink-400">—</span>}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            {movementsList.length===0 && <div className="p-8 text-center text-ink-500 text-[12px]">該当する入出庫履歴はありません。</div>}
          </div>
        </>
      )}

      {moveOpen && <StockMoveModal preset={typeof moveOpen==="object"?moveOpen:{type:presetType}} parts={parts} jobs={jobs} onSubmit={submitMove} onClose={()=>setMoveOpen(false)} />}

      <div className="impl">
        <b>実装メモ：</b> <code>Data Type: StockMovement (part, type[in/out/allocate/release/adjust], qty, balance, job?, by, ts, note)</code>。
        入庫/出庫/棚卸 で <code>Part.stock_qty</code> を Make changes で更新し、StockMovement に履歴を追加。
        <code>stock_status</code> は <code>stock_qty</code> と <code>safety_stock</code> から Workflow で自動算出（0=out / 0&lt;qty&lt;safety=low / qty≥safety=in_stock）。
        引当/解除 は <code>JobPart.allocated_qty</code> と連動（案件詳細→使用予定パーツの「引当」ボタンから任意タイミングで実行）。
        <code>利用可能(フリー在庫) = stock_qty − Σ JobPart.allocated_qty</code> で算出し、<b>引当では stock_qty を動かさない</b>（予約のみ）。出庫確定時に引当を消し込み <code>type=out</code> で実在庫を減算。
      </div>
    </div>
  );
}

function StockMoveModal({ preset, parts, jobs, onSubmit, onClose }){
  const [type, setType] = useState(preset.type || "in");
  const [partId, setPartId] = useState(preset.partId || parts[0]?.id);
  const [qty, setQty] = useState(1);
  const [jobId, setJobId] = useState("");
  const [note, setNote] = useState("");

  const part = parts.find(p=>p.id===partId);
  const isAdjust = type === "adjust";
  const previewBalance = part ? (
    isAdjust ? part.stockQty + Number(qty || 0) :
    type==="in"  ? part.stockQty + Math.abs(Number(qty||0)) :
    type==="out" ? Math.max(0, part.stockQty - Math.abs(Number(qty||0))) :
    part.stockQty
  ) : null;

  const submit = () => {
    if (!partId || !Number(qty)) return;
    onSubmit({ partId, type, qty: isAdjust ? Number(qty) : Math.abs(Number(qty)), jobId, note });
  };

  return (
    <div className="fixed inset-0 z-50 grid place-items-center">
      <div className="absolute inset-0 bg-black/30" onClick={onClose}/>
      <div className="relative bg-white rounded-lg shadow-xl w-[560px] max-w-[95vw]">
        <div className="px-5 py-3 border-b border-ink-200 flex items-center justify-between">
          <div className="font-bold text-ink-900">在庫移動を登録</div>
          <button onClick={onClose} className="text-ink-400 hover:text-ink-700 text-xl">×</button>
        </div>
        <div className="p-5 space-y-3">
          <Field label="種別" required>
            <div className="flex gap-1.5 flex-wrap">
              {Object.values(MOVE_TYPES).map(m=>(
                <button key={m.key} type="button" onClick={()=>setType(m.key)}
                  className={"chip cursor-pointer "+(type===m.key ? m.cls+" ring-2 ring-brand-500" : "bg-white border border-ink-200 text-ink-500 hover:bg-ink-50")}>
                  {m.label}
                </button>
              ))}
            </div>
          </Field>
          <Field label="パーツ" required>
            <select className="field" value={partId} onChange={e=>setPartId(e.target.value)}>
              {parts.map(p=><option key={p.id} value={p.id}>{p.name} / {p.model}（現在庫 {p.stockQty}）</option>)}
            </select>
          </Field>
          <div className="grid grid-cols-2 gap-3">
            <Field label={isAdjust ? "調整数（±）" : "数量"} required>
              <input type="number" className="field num" value={qty} onChange={e=>setQty(e.target.value)} placeholder={isAdjust?"例：-2 / +3":"例：5"}/>
              {isAdjust && <div className="text-[11px] text-ink-500 mt-1">棚卸で実数が帳簿より少ない場合はマイナスで入力</div>}
            </Field>
            <Field label="関連案件（任意）">
              <select className="field" value={jobId} onChange={e=>setJobId(e.target.value)}>
                <option value="">なし</option>
                {jobs.filter(j=>!["won","lost"].includes(j.status)).map(j=><option key={j.id} value={j.id}>{j.code} {j.name}</option>)}
              </select>
            </Field>
          </div>
          <Field label="備考"><textarea className="field h-16" value={note} onChange={e=>setNote(e.target.value)} placeholder="例：定期発注／緊急出荷／棚卸差異の理由 など"/></Field>

          {part && (
            <div className="bg-ink-50 border border-ink-100 rounded p-3 text-[12px]">
              <div className="flex items-center justify-between">
                <span className="text-ink-600">現在在庫</span><span className="num font-medium">{part.stockQty}</span>
              </div>
              <div className="flex items-center justify-between mt-1">
                <span className="text-ink-600">更新後の在庫</span>
                <span className={"num font-bold "+(previewBalance===0?"text-rose-600":(part.safetyStock>0 && previewBalance<part.safetyStock)?"text-amber-700":"text-emerald-600")}>{previewBalance}</span>
              </div>
              {part.safetyStock>0 && <div className="text-[11px] text-ink-500 mt-1">安全在庫：{part.safetyStock}</div>}
            </div>
          )}
        </div>
        <div className="px-5 py-3 border-t border-ink-200 flex items-center justify-end gap-2">
          <button className="btn btn-ghost" onClick={onClose}>キャンセル</button>
          <button className="btn btn-primary" disabled={!partId || !Number(qty)} onClick={submit}>登録</button>
        </div>
      </div>
    </div>
  );
}

// ===================== Similar Search =====================
function SimilarSearch({ jobs, revs, customers, setRoute }){
  const [customer, setCustomer] = useState("all");
  const [category, setCategory] = useState("all");
  const [plc, setPlc] = useState("all");
  const [keyword, setKeyword] = useState("");
  const [amtMin, setAmtMin] = useState("");
  const [amtMax, setAmtMax] = useState("");

  const results = useMemo(()=>{
    const enriched = jobs.map(j => ({...j, lastAmount: revs.filter(v=>v.jobId===j.id).sort((a,b)=>b.rev-a.rev)[0]?.amount || j.amount || 0 }));
    return enriched.filter(j=>{
      if (customer!=="all" && j.customerId!==customer) return false;
      if (category!=="all" && j.category!==category) return false;
      if (plc!=="all" && j.plc!==plc) return false;
      if (keyword && !(j.name.includes(keyword) || j.code.includes(keyword))) return false;
      if (amtMin && j.lastAmount < Number(amtMin)*10000) return false;
      if (amtMax && j.lastAmount > Number(amtMax)*10000) return false;
      return true;
    });
  }, [jobs, revs, customer, category, plc, keyword, amtMin, amtMax]);

  return (
    <div className="space-y-4">
      <PageHeader title="類似案件検索" desc="過去案件から条件で絞り込み、見積の参考にします。"/>

      <div className="card p-4 grid grid-cols-12 gap-3">
        <div className="col-span-3">
          <div className="label mb-1">顧客</div>
          <select className="field" value={customer} onChange={e=>setCustomer(e.target.value)}>
            <option value="all">すべて</option>
            {customers.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </div>
        <div className="col-span-3">
          <div className="label mb-1">案件種別</div>
          <select className="field" value={category} onChange={e=>setCategory(e.target.value)}>
            <option value="all">すべて</option>
            {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        <div className="col-span-3">
          <div className="label mb-1">PLCメーカー</div>
          <select className="field" value={plc} onChange={e=>setPlc(e.target.value)}>
            <option value="all">すべて</option>
            {PLC_MAKERS.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        <div className="col-span-3">
          <div className="label mb-1">キーワード（案件名/番号）</div>
          <input className="field" value={keyword} onChange={e=>setKeyword(e.target.value)} placeholder="例：更新、改造、操作盤"/>
        </div>
        <div className="col-span-3">
          <div className="label mb-1">金額帯（万円）</div>
          <div className="flex gap-2 items-center">
            <input className="field num" type="number" placeholder="下限" value={amtMin} onChange={e=>setAmtMin(e.target.value)}/>
            <span className="text-ink-400">〜</span>
            <input className="field num" type="number" placeholder="上限" value={amtMax} onChange={e=>setAmtMax(e.target.value)}/>
          </div>
        </div>
      </div>

      <div className="flex items-center justify-between">
        <div className="text-[12px] text-ink-600">{results.length}件ヒット</div>
      </div>

      <div className="grid grid-cols-2 gap-3">
        {results.map(j=>(
          <button key={j.id} onClick={()=>setRoute({name:"job", jobId:j.id})} className="text-left card p-4 hover:border-brand-500 hover:shadow-sm transition">
            <div className="flex items-start justify-between gap-2">
              <div className="min-w-0">
                <div className="text-[11px] text-ink-500 num">{j.code} · {cusName(j.customerId)}</div>
                <div className="font-medium text-ink-900 mt-1">{j.name}</div>
              </div>
              <span className={"chip shrink-0 "+STATUS[j.status].cls}>{STATUS[j.status].label}</span>
            </div>
            <div className="mt-2 flex flex-wrap gap-1">
              <span className="chip bg-ink-100 text-ink-700">{j.category}</span>
              {j.plc!=="-" && <span className="chip bg-ink-100 text-ink-700">{j.plc}</span>}
            </div>
            <div className="mt-3 flex items-center justify-between text-[12px]">
              <span className="text-ink-500">提出: {j.deadline}</span>
              <span className="num font-bold text-ink-900">{j.lastAmount?yen(j.lastAmount):"—"}</span>
            </div>
          </button>
        ))}
      </div>
      {results.length===0 && <div className="card p-8 text-center text-ink-500 text-[12px]">条件に合う案件は見つかりませんでした。</div>}

      <div className="impl">
        <b>実装メモ：</b> Bubble の Search constraint は AND結合。<code>Customer, Category, PLC, name contains keyword, amount ≥, amount ≤</code> を条件として接続。
        Phase2 で「タグ」「過去Rev内のキーワード」「添付ファイル名検索」を追加可能（ファイル本文検索は別途 Algolia 等の検討要）。
      </div>
    </div>
  );
}

function NewRequestSlideOver({ jobs, customers, requests, setRequests, setComments, setRoute, onClose }){
  const [step, setStep] = useState(1);
  const activeCustomers = customers.filter(c=>c.active);
  const [form, setForm] = useState({
    jobName:"", customerId: activeCustomers[0]?.id || "c1", category:CATEGORIES[0], plc:PLC_MAKERS[0],
    estimatorId:"u4", dueDate:"", budget:"", spec:"", files:[],

  const missing = [];
  if (!form.jobName) missing.push("案件名");
  if (!form.dueDate) missing.push("提出希望日");
  if (!form.spec || form.spec.length<10) missing.push("仕様メモ（10文字以上）");
  if (form.files.length===0) missing.push("添付ファイル（最低1点）");

  const submit = () => {
    alert("見積依頼を登録しました（モック）。\n積算担当へ通知され、案件一覧に追加されます。");
    onClose();
  };

  return (
    <div className="fixed inset-0 z-50 flex justify-end">
      <div className="absolute inset-0 bg-black/30" onClick={onClose}/>
      <div className="relative bg-white w-[640px] h-full shadow-xl flex flex-col">
        <div className="flex items-center justify-between px-5 py-3 border-b border-ink-200">
          <div>
            <div className="font-bold text-ink-900">＋ 見積依頼を登録</div>
            <div className="text-[11px] text-ink-500">営業 → 積算 への依頼を作成します</div>
          </div>
          <button onClick={onClose} className="text-ink-400 hover:text-ink-700 text-xl">×</button>
        </div>

        <div className="px-5 py-3 border-b border-ink-100 flex gap-2 text-[12px]">
          {["基本情報","仕様・添付","確認"].map((l,i)=>(
            <div key={i} className={"flex items-center gap-2 "+(step===i+1?"text-brand-700 font-bold":step>i+1?"text-emerald-600":"text-ink-400")}>
              <span className={"w-5 h-5 grid place-items-center rounded-full text-[11px] "+(step===i+1?"bg-brand-600 text-white":step>i+1?"bg-emerald-500 text-white":"bg-ink-100 text-ink-500")}>{step>i+1?"✓":i+1}</span>
              {l}
              {i<2 && <span className="text-ink-300">›</span>}
            </div>
          ))}
        </div>

        <div className="flex-1 overflow-y-auto p-5 space-y-3">
          {step===1 && (
            <>
              <Field label="案件名" required>
                <input className="field" value={form.jobName} onChange={e=>update("jobName", e.target.value)} placeholder="例：第2工場 No.4ライン 制御盤 更新"/>
              </Field>
              <div className="grid grid-cols-2 gap-3">
                <Field label="顧客" required>
                  <select className="field" value={form.customerId} onChange={e=>update("customerId", e.target.value)}>
                    {activeCustomers.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                </Field>
                <Field label="案件種別" required>
                  <select className="field" value={form.category} onChange={e=>update("category", e.target.value)}>
                    {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
                  </select>
                </Field>
                <Field label="PLCメーカー">
                  <select className="field" value={form.plc} onChange={e=>update("plc", e.target.value)}>
                    {PLC_MAKERS.map(c=><option key={c} value={c}>{c}</option>)}
                  </select>
                </Field>
                <Field label="積算担当">
                  <select className="field" value={form.estimatorId} onChange={e=>update("estimatorId", e.target.value)}>
                    {USERS.filter(u=>u.role==="積算").map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
                  </select>
                </Field>
                <Field label="提出希望日" required>
                  <input type="date" className="field" value={form.dueDate} onChange={e=>update("dueDate", e.target.value)}/>
                </Field>
                <Field label="想定予算（円・任意）">
                  <input type="number" className="field num" value={form.budget} onChange={e=>update("budget", e.target.value)} placeholder="例：3000000"/>
                </Field>
              </div>
            </>
          )}

          {step===2 && (
            <>
              <Field label="仕様メモ・要求事項" required>
                <textarea className="field h-40" value={form.spec} onChange={e=>update("spec", e.target.value)} placeholder="例：主回路 75kW×2、補助 30A×6回路、既設盤寸法 W1600×H2000×D600、CE準拠不要"/>
                <div className="text-[11px] text-ink-500 mt-1">主回路容量・点数・既設盤の有無・現地確認の要否などを記載すると、差戻しが減ります。</div>
              </Field>
              <Field label="添付ファイル" required>
                <div className="border-2 border-dashed border-ink-200 rounded p-6 text-center text-[12px] text-ink-500">
                  ここにドラッグ＆ドロップ／<span className="text-brand-600 underline cursor-pointer" onClick={()=>update("files",[...form.files, {name:"図面_"+(form.files.length+1)+".pdf", size:"1.4MB"}])}>ファイルを選択</span>
                </div>
                {form.files.length>0 && (
                  <ul className="mt-2 space-y-1">

                  </ul>
